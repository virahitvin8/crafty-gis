name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # =========================================================================
  # BUILD AND PUBLISH DOCKER IMAGES
  # =========================================================================
  docker:
    name: Docker Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: crafty-gis-server
          file: crafty-gis-server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: crafty-gis-client
          file: crafty-gis-client/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================================================
  # BUILD DESKTOP APP — Windows & Linux ONLY (no macOS)
  # =========================================================================
  tauri:
    name: Desktop App (${{ matrix.platform }})
    needs: [docker]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            target: x86_64-unknown-linux-gnu
            bundle: appimage
          - os: windows-latest
            platform: windows
            target: x86_64-pc-windows-msvc
            bundle: msi
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: crafty-gis-client/package-lock.json

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Install Frontend Dependencies
        working-directory: crafty-gis-client
        run: npm ci

      - name: Build Tauri App
        run: cargo tauri build --bundles ${{ matrix.bundle }}
        working-directory: crafty-gis/src-tauri

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crafty-gis-desktop-${{ matrix.platform }}
          path: crafty-gis/src-tauri/target/release/bundle/${{ matrix.bundle }}/
          if-no-files-found: warn

  # =========================================================================
  # BUILD ANDROID PWA (Web App Bundle for Android Chrome)
  # =========================================================================
  pwa:
    name: Build Android PWA
    needs: [docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: crafty-gis-client/package-lock.json

      - name: Install Dependencies
        working-directory: crafty-gis-client
        run: npm ci

      - name: Build Next.js PWA
        working-directory: crafty-gis-client
        run: npm run build

      - name: Upload PWA Build
        uses: actions/upload-artifact@v4
        with:
          name: crafty-gis-pwa
          path: crafty-gis-client/out/
          if-no-files-found: warn

  # =========================================================================
  # PyInstaller — Windows portable .exe
  # =========================================================================
  pyinstaller:
    name: PyInstaller Portable (Windows)
    needs: [docker]
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r crafty-gis-server/requirements.txt
          pip install pyinstaller

      - name: Build Portable EXE
        run: python build_exe.py
        continue-on-error: true

      - name: Upload Portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: crafty-gis-portable-windows
          path: dist/CRAFTY-GIS/
          if-no-files-found: warn

  # =========================================================================
  # CREATE GITHUB RELEASE
  # =========================================================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [docker, tauri, pwa, pyinstaller]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CRAFTY GIS v${{ steps.version.outputs.VERSION }}"
          body: |
            # CRAFTY GIS v${{ steps.version.outputs.VERSION }}

            ## 🚀 Download

            | Platform | File | How to Use |
            |:---------|:-----|:-----------|
            | 🪟 **Windows** | `CRAFTY-GIS_*.msi` | Double-click to install |
            | 🪟 **Windows Portable** | `CRAFTY-GIS.exe` | Run without installing |
            | 🐧 **Linux** | `CRAFTY-GIS_*.AppImage` | `chmod +x` then run |
            | 📱 **Android** | Open URL in Chrome → Add to Home Screen | PWA |

            ## ⚡ Quick Start

            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd crafty-gis
            ./start.sh        # Linux
            # start.bat       # Windows
            ```

            ## 🤖 Free AI Setup (required)

            ```bash
            # Install Ollama (free, local, unlimited)
            curl -fsSL https://ollama.ai/install.sh | sh
            ollama serve
            ollama pull llama3
            ```

            See [QUICKSTART.md](QUICKSTART.md) for full setup guide.

            ## What's New
            See [CHANGELOG.md](CHANGELOG.md) for details.
          draft: false
          prerelease: false
          make_latest: true
          files: |
            release-artifacts/**/*
            start.sh
            start.bat
            QUICKSTART.md
