name: Build PyInstaller Desktop App (Windows)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag (optional)"
        required: false

jobs:
  pyinstaller:
    name: PyInstaller (Windows)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: crafty-gis/backend/requirements.txt

      - name: Install Python Dependencies
        working-directory: crafty-gis/backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Frontend Dependencies
        working-directory: crafty-gis/frontend
        run: npm install

      - name: Build Frontend
        working-directory: crafty-gis/frontend
        run: npm run build

      - name: Generate App Icons
        run: python scripts/generate-icons.py
        continue-on-error: true

      - name: Build with PyInstaller
        run: python scripts/build-desktop-pyinstaller.py

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crafty-gis-desktop-pyinstaller-${{ steps.version.outputs.VERSION }}
          path: dist/CRAFTY-GIS/
          if-no-files-found: warn
