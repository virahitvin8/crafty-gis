name: Mark Stale Issues

on:
  schedule:
    - cron: "0 0 * * *"  # Daily

jobs:
  stale:
    name: Stale Management
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had recent activity.
            It will be closed if no further activity occurs within 14 days.
            
            If this is still relevant, please add a comment to keep it active.
          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not had recent activity.
            It will be closed if no further activity occurs within 14 days.
            
            If this is still in progress, please add a comment to keep it active.
          days-before-stale: 90
          days-before-close: 30
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,security,enhancement"
          exempt-pr-labels: "pinned,security,dependencies"
