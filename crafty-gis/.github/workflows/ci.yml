name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================================================================
  # BACKEND CI
  # =========================================================================
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
      fail-fast: false

    defaults:
      run:
        working-directory: crafty-gis-server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: crafty-gis-server/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gdal-bin libgdal-dev libspatialindex-dev \
            libxml2-dev libxslt1-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-asyncio pytest-cov httpx

      - name: Lint with Ruff
        run: ruff check app/ --output-format=github

      - name: Format check with Ruff
        run: ruff format app/ --check

      - name: Type check with MyPy
        run: mypy app/ --ignore-missing-imports
        continue-on-error: true

      - name: Run tests
        run: |
          python -m pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term \
            -v
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: crafty-gis-server/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # =========================================================================
  # FRONTEND CI
  # =========================================================================
  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: crafty-gis-client

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: crafty-gis-client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npm run lint
        continue-on-error: true

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # =========================================================================
  # DOCKER BUILD
  # =========================================================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./crafty-gis-server
          file: ./crafty-gis-server/Dockerfile
          push: false
          tags: crafty-gis-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./crafty-gis-client
          file: ./crafty-gis-client/Dockerfile
          push: false
          tags: crafty-gis-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build full stack with Docker Compose
        run: docker compose -f docker-compose.yml build --no-cache

  # =========================================================================
  # SECURITY SCAN
  # =========================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run safety check (Python deps)
        run: |
          pip install safety
          safety check
        continue-on-error: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run npm audit
        run: |
          cd crafty-gis-client
          npm audit --audit-level=high
        continue-on-error: true

  # =========================================================================
  # SUMMARY
  # =========================================================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker, security]
    if: always()

    steps:
      - name: Check all jobs
        run: |
          echo "## ✅ CRAFTY GIS CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.backend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.frontend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "| Docker | ${{ needs.docker.result }}" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
