name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # =========================================================================
  # BUILD AND PUBLISH DOCKER IMAGES
  # =========================================================================
  docker:
    name: Docker Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Backend
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./crafty-gis-server
          file: ./crafty-gis-server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Frontend
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./crafty-gis-client
          file: ./crafty-gis-client/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================================================
  # BUILD TAURI DESKTOP APP (Windows, macOS, Linux)
  # =========================================================================
  tauri:
    name: Tauri Desktop (${{ matrix.os }})
    needs: [docker]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            target: x86_64-unknown-linux-gnu
            bundle: appimage
          - os: windows-latest
            platform: windows
            target: x86_64-pc-windows-msvc
            bundle: msi
          - os: macos-latest
            platform: macos
            target: aarch64-apple-darwin
            bundle: dmg
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: crafty-gis-client/package-lock.json

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: crafty-gis-client

      - name: Build Frontend
        run: npm run build
        working-directory: crafty-gis-client

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install macOS Dependencies
        if: matrix.platform == 'macos'
        run: brew install librsvg

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Generate App Icons
        run: python scripts/generate-icons.py
        continue-on-error: true

      - name: Build Tauri App
        run: cargo tauri build --bundles ${{ matrix.bundle }}
        working-directory: crafty-gis

      - name: Upload Tauri Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crafty-gis-desktop-${{ matrix.platform }}
          path: crafty-gis/src-tauri/target/release/bundle/${{ matrix.bundle }}/
          if-no-files-found: warn

  # =========================================================================
  # BUILD PYINSTALLER DESKTOP APP (Windows)
  # =========================================================================
  pyinstaller:
    name: PyInstaller Desktop (Windows)
    needs: [docker]
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: crafty-gis-server/requirements.txt

      - name: Install Python Dependencies
        working-directory: crafty-gis-server
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Frontend
        working-directory: crafty-gis/frontend
        run: |
          npm install
          npm run build

      - name: Generate App Icons
        run: python scripts/generate-icons.py
        continue-on-error: true

      - name: Build with PyInstaller
        run: python scripts/build-desktop-pyinstaller.py

      - name: Upload PyInstaller Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crafty-gis-desktop-pyinstaller
          path: dist/CRAFTY-GIS/
          if-no-files-found: warn

  # =========================================================================
  # CREATE GITHUB RELEASE (attaches all artifacts)
  # =========================================================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [docker, tauri, pyinstaller]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: false

      - name: Generate Release Notes
        run: |
          cat > release_notes.md << 'EOF'
          # CRAFTY GIS v${{ steps.version.outputs.VERSION }}

          ## 🚀 Desktop Installers

          | Platform | Installer |
          |----------|-----------|
          | 🪟 Windows | CRAFTY-GIS_*.msi (Tauri) — also available as portable .exe (PyInstaller) |
          | 🍎 macOS    | CRAFTY-GIS_*.dmg (Tauri) |
          | 🐧 Linux    | CRAFTY-GIS_*.AppImage (Tauri) |

          Download the installer for your platform below.

          ### 🐳 Docker (Server Deployment)

          - `ghcr.io/${{ github.repository }}/backend:latest`
          - `ghcr.io/${{ github.repository }}/frontend:latest`

          ## What's New

          See [CHANGELOG.md](CHANGELOG.md) for detailed release notes.

          ## Quick Start

          **Desktop:** Download and run the installer for your platform.
          **Docker:** `docker compose up -d`
          **Source:** `git clone https://github.com/${{ github.repository }}.git`

          EOF

      - name: List artifacts
        run: |
          echo "## Release Artifacts" >> $GITHUB_STEP_SUMMARY
          find release-artifacts -type f | head -50 >> $GITHUB_STEP_SUMMARY

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CRAFTY GIS v${{ steps.version.outputs.VERSION }}"
          body_path: release_notes.md
          draft: false
          prerelease: false
          make_latest: true
          files: |
            release-artifacts/**/*
            crafty-gis/setup.sh
            docker-compose.yml
