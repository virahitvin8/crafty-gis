<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c8ee7"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7cc6fb"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bgGrad)" opacity="0.95"/>
  <circle cx="256" cy="256" r="240" fill="#0b1120" stroke="url(#bgGrad)" stroke-width="4"/>

  <!-- Grid lines (latitude/longitude) -->
  <ellipse cx="256" cy="256" rx="160" ry="60" fill="none" stroke="rgba(12,142,231,0.15)" stroke-width="1"/>
  <ellipse cx="256" cy="256" rx="120" ry="45" fill="none" stroke="rgba(12,142,231,0.15)" stroke-width="1"/>
  <ellipse cx="256" cy="256" rx="80" ry="30" fill="none" stroke="rgba(12,142,231,0.15)" stroke-width="1"/>
  <line x1="96" y1="256" x2="416" y2="256" stroke="rgba(12,142,231,0.15)" stroke-width="1"/>
  <line x1="256" y1="136" x2="256" y2="376" stroke="rgba(12,142,231,0.15)" stroke-width="1"/>

  <!-- Globe / Earth icon -->
  <circle cx="256" cy="256" r="120" fill="none" stroke="url(#globeGrad)" stroke-width="2.5" filter="url(#glow)"/>

  <!-- Continents abstract representation -->
  <path d="M190 220 Q200 200 220 208 Q235 215 240 205 Q248 190 260 195 Q272 200 270 215 Q268 228 278 235 Q290 242 285 258 Q280 272 270 268 Q258 262 250 270 Q240 280 228 275 Q215 268 210 255 Q205 240 195 235 Z" fill="url(#globeGrad)" opacity="0.5"/>
  <path d="M130 280 Q140 270 150 275 Q158 280 155 290 Q152 298 145 300 Q138 302 135 295 Z" fill="url(#globeGrad)" opacity="0.4"/>
  <path d="M310 240 Q320 232 335 238 Q345 242 348 255 Q350 265 340 270 Q330 275 320 268 Q312 260 310 248 Z" fill="url(#globeGrad)" opacity="0.4"/>

  <!-- Crosshair / Target marker -->
  <circle cx="256" cy="256" r="8" fill="none" stroke="#34d399" stroke-width="2"/>
  <line x1="256" y1="238" x2="256" y2="274" stroke="#34d399" stroke-width="1.5" opacity="0.8"/>
  <line x1="238" y1="256" x2="274" y2="256" stroke="#34d399" stroke-width="1.5" opacity="0.8"/>

  <!-- Satellite arcs -->
  <path d="M180 180 Q200 160 230 170" fill="none" stroke="#7cc6fb" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.6"/>
  <circle cx="180" cy="180" r="4" fill="#7cc6fb" opacity="0.8"/>
  <path d="M330 330 Q310 350 280 340" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.6"/>
  <circle cx="330" cy="330" r="4" fill="#34d399" opacity="0.8"/>

  <!-- Text -->
  <text x="256" y="430" font-family="'Geist', 'Inter', system-ui, sans-serif" font-size="48" font-weight="700" fill="white" text-anchor="middle" letter-spacing="6">CRAFTY</text>
  <text x="256" y="458" font-family="'Geist', 'Inter', system-ui, sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="12">GIS</text>

  <!-- Version -->
  <text x="256" y="482" font-family="'Geist Mono', monospace" font-size="8" font-weight="400" fill="rgba(255,255,255,0.3)" text-anchor="middle">v1.0.0</text>
</svg>
