version: "3.9"

services:
  # PostgreSQL with PostGIS
  postgis:
    image: postgis/postgis:15-3.4
    container_name: crafty-gis-db
    environment:
      POSTGRES_USER: crafty
      POSTGRES_PASSWORD: crafty_gis_2024
      POSTGRES_DB: crafty_gis
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crafty"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Ollama for local AI
  ollama:
    image: ollama/ollama:latest
    container_name: crafty-gis-ai
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build:
      context: ./crafty-gis-server
      dockerfile: Dockerfile
    container_name: crafty-gis-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://crafty:crafty_gis_2024@postgis:5432/crafty_gis
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.1:8b
      - ENVIRONMENT=production
      - DEBUG=false
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:5173"]
      - DATA_DIR=/data
    ports:
      - "8000:8000"
    volumes:
      - crafty_data:/data
    depends_on:
      postgis:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  # Next.js Frontend
  frontend:
    build:
      context: ./crafty-gis-client
      dockerfile: Dockerfile
    container_name: crafty-gis-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgis_data:
  ollama_data:
  crafty_data:
