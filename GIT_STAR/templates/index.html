<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Assignment Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.7);
            --surface-border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(56, 189, 248, 0.1) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .container {
            display: flex;
            gap: 2rem;
            max-width: 1200px;
            width: 100%;
            animation: fadeUp 0.8s ease-out 0.2s both;
        }

        .glass-panel {
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--surface-border);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .form-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .preview-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: 500;
            font-size: 0.95rem;
            color: var(--text);
        }

        input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--surface-border);
            color: var(--text);
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: inherit;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }

        .preview-container {
            flex-grow: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--surface-border);
            border-radius: 0.5rem;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            overflow: hidden;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        .status-msg {
            margin-top: 1rem;
            font-size: 0.9rem;
            text-align: center;
            min-height: 1.5em;
        }

        .error { color: var(--error); }
        .success { color: #10b981; }

        .download-btn {
            background: #10b981;
            display: none;
            text-decoration: none;
            text-align: center;
        }

        .download-btn:hover {
            background: #059669;
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Spatial Analysis Generator</h1>
        <p>Enter your details to generate your customized assignment document.</p>
    </div>

    <div class="container">
        <!-- Form Section -->
        <div class="glass-panel form-section">
            <h2>Student Details</h2>
            
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="e.g. John Doe" required>
            </div>

            <div class="form-group">
                <label for="pid">PID Number</label>
                <input type="text" id="pid" placeholder="e.g. 25MSRSGIS001" required>
            </div>

            <div class="form-group">
                <label for="course">Course</label>
                <input type="text" id="course" placeholder="e.g. M.Sc. GIS & Remote Sensing" required>
            </div>

            <button id="generateBtn">
                <span class="btn-text">Generate Document</span>
                <div class="loader" id="loader"></div>
            </button>

            <div id="status" class="status-msg"></div>
        </div>

        <!-- Preview Section -->
        <div class="glass-panel preview-section">
            <h2>Document Preview</h2>
            <div class="preview-container" id="previewContainer">
                <span id="previewPlaceholder">Fill the form and generate to preview the PDF.</span>
                <iframe id="pdfIframe"></iframe>
            </div>
            <a id="downloadBtn" class="download-btn" target="_blank" style="padding: 1rem; border-radius: 0.5rem; font-weight: 600; color: white; display: none;">
                Download PDF
            </a>
        </div>
    </div>

    <script>
        const generateBtn = document.getElementById('generateBtn');
        const loader = document.getElementById('loader');
        const btnText = document.querySelector('.btn-text');
        const statusEl = document.getElementById('status');
        const pdfIframe = document.getElementById('pdfIframe');
        const previewPlaceholder = document.getElementById('previewPlaceholder');
        const downloadBtn = document.getElementById('downloadBtn');

        generateBtn.addEventListener('click', async () => {
            const name = document.getElementById('name').value.trim();
            const pid = document.getElementById('pid').value.trim();
            const course = document.getElementById('course').value.trim();

            if (!name || !pid || !course) {
                showStatus('Please fill in Name, PID, and Course.', 'error');
                return;
            }

            // UI Loading state
            generateBtn.disabled = true;
            loader.style.display = 'block';
            btnText.textContent = 'Generating...';
            statusEl.textContent = '';
            pdfIframe.style.display = 'none';
            downloadBtn.style.display = 'none';
            previewPlaceholder.style.display = 'block';
            previewPlaceholder.textContent = 'Generating document and converting to PDF... this may take a few seconds.';

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, pid, course })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showStatus('Document generated successfully!', 'success');
                    
                    // Show PDF in iframe
                    pdfIframe.src = data.pdf_url + '#view=FitH';
                    pdfIframe.style.display = 'block';
                    previewPlaceholder.style.display = 'none';

                    // Setup download button
                    downloadBtn.href = data.pdf_url;
                    downloadBtn.download = ''; // Let browser handle filename from URL
                    downloadBtn.style.display = 'block';
                } else {
                    showStatus(`Error: ${data.error || 'Unknown error occurred'}`, 'error');
                    previewPlaceholder.textContent = 'Failed to generate preview.';
                }
            } catch (err) {
                showStatus(`Connection error: ${err.message}`, 'error');
                previewPlaceholder.textContent = 'Failed to connect to server.';
            } finally {
                generateBtn.disabled = false;
                loader.style.display = 'none';
                btnText.textContent = 'Generate Document';
            }
        });

        function showStatus(msg, type) {
            statusEl.textContent = msg;
            statusEl.className = `status-msg ${type}`;
        }
    </script>
</body>
</html>
